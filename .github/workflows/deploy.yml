name: Build & Deploy to Google Play

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      track:
        description: 'Release track'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore app/hasitv-keystore.jks \
            -alias hasitv \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass hasitv2026 \
            -keypass hasitv2026 \
            -dname "CN=HasiTV, OU=Hasi Elektronic, O=Hasi Elektronic, L=Vaihingen, ST=BW, C=DE"
          
          # Export upload certificate (.pem) for Play Console
          keytool -export \
            -keystore app/hasitv-keystore.jks \
            -alias hasitv \
            -storepass hasitv2026 \
            -file upload_cert.der
          
          openssl x509 -inform der -in upload_cert.der -out upload_cert.pem
          
          echo "=== Keystore SHA1 fingerprint ==="
          keytool -list -keystore app/hasitv-keystore.jks -storepass hasitv2026 -alias hasitv

      - name: Build Release AAB
        run: ./gradlew bundleRelease
        env:
          KEYSTORE_PASSWORD: hasitv2026
          KEY_ALIAS: hasitv
          KEY_PASSWORD: hasitv2026

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ secrets.PACKAGE_NAME }}
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: draft
          changesNotSentForReview: true
          whatsNewDirectory: distribution/whatsnew

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hasitv-release-artifacts
          path: |
            app/build/outputs/bundle/release/app-release.aab
            upload_cert.pem
            app/hasitv-keystore.jks
          retention-days: 30
